<section class="page">
  <header>
    <cuis-logo/>
  </header>
  <h1 [class]="'content-h1-theme-' + getThemeClass()">Cookbook</h1>
  <div class="cuisine-wrapper">
    <div class="card">
      <a routerLink="/cuisine/italian">
        <div class="title-wrapper">
          <h2>Italian cuisine</h2>
          <img src="/img/icons/italian.svg" alt="" />
        </div>
        <img src="/img/food/italian.jpg" alt="" />
      </a>
    </div>
    <div class="card">
      <a routerLink="/cuisine/german">
        <div class="title-wrapper">
          <h2>German cuisine</h2>
          <img src="/img/icons/german.svg" alt="" />
        </div>
        <img src="/img/food/german.jpg" alt="" />
      </a>
    </div>
    <div class="card">
      <a routerLink="/cuisine/japanese">
        <div class="title-wrapper">
          <h2>Japanese cuisine</h2>
          <img src="/img/icons/japanese.svg" alt="" />
        </div>
        <img src="/img/food/japanese.jpg" alt="" />
      </a>
    </div>
    <div class="card">
      <a routerLink="/cuisine/gourmet">
        <div class="title-wrapper">
          <h2>Gourmet cuisine</h2>
          <img src="/img/icons/gourmet.svg" alt="" />
        </div>
        <img src="/img/food/gourmet.jpg" alt="" />
      </a>
    </div>
    <div class="card">
      <a routerLink="/cuisine/indian">
        <div class="title-wrapper">
          <h2>Indian cuisine</h2>
          <img src="/img/icons/indian.svg" alt="" />
        </div>
        <img src="/img/food/indian.jpg" alt="" />
      </a>
    </div>
    <div class="card">
      <a routerLink="/cuisine/fusion">
        <div class="title-wrapper">
          <h2>Fusion cuisine</h2>
          <img src="/img/icons/fusion.svg" alt="" />
        </div>
        <img src="/img/food/fusion.jpg" alt="" />
      </a>
    </div>
  </div>
  <div class="link-wrapper">
    <a routerLink="/generate-recipe">Generate new recipe</a>
    <img src="/img/ui/arrow-green-right.svg" alt="" />
  </div>
</section>
